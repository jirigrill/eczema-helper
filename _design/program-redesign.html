<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program — Redesign proposal</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js" crossorigin></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #ECE3DF; min-height: 100vh; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #3D2B2F; }

  .canvas { width: 100%; padding: 36px 32px 96px; }

  .canvas-eyebrow { color: rgba(61,43,47,0.5); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
  .canvas-heading { color: #3D2B2F; font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .canvas-sub { color: rgba(61,43,47,0.55); font-size: 13px; line-height: 1.6; margin-bottom: 36px; max-width: 920px; }

  .section-eyebrow { color: rgba(61,43,47,0.4); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  .section-heading { color: #3D2B2F; font-size: 17px; font-weight: 800; margin-bottom: 4px; }
  .section-desc { color: rgba(61,43,47,0.55); font-size: 12px; line-height: 1.6; margin-bottom: 22px; max-width: 720px; }

  .phone-row { display: flex; gap: 20px; overflow-x: auto; padding: 4px 0 14px; align-items: flex-start; flex-wrap: nowrap; }
  .phone-row::-webkit-scrollbar { height: 6px; }
  .phone-row::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

  .phone-wrap { flex: 0 0 380px; }
  .phase-label { color: rgba(61,43,47,0.65); font-size: 11px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 7px; }
  .phase-label-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .phone-shell {
    width: 380px; background: #FAF8F8; border-radius: 44px; overflow: hidden;
    box-shadow: 0 18px 56px rgba(60,30,40,0.18), 0 0 0 1px rgba(0,0,0,0.04);
  }
  .phone-status { height: 44px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 22px 0 18px; position: relative; border-bottom: 1px solid #EDE8E9; }
  .phone-island { width: 112px; height: 32px; background: #111; border-radius: 18px; position: absolute; left: 50%; transform: translateX(-50%); top: 6px; }
  .phone-time { font-size: 13px; font-weight: 700; color: #3D2B2F; }
  .phone-battery { font-size: 11px; color: #3D2B2F; }
  .phone-content { height: 800px; overflow-y: auto; background: #FAF8F8; }
  .phone-content::-webkit-scrollbar { display: none; }
  .phone-nav { background: rgba(255,255,255,0.97); border-top: 1px solid #EDE8E9; display: flex; padding-bottom: 10px; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 9px 0 4px; gap: 2px; font-size: 9px; color: #7A6468; font-weight: 500; border: none; background: none; cursor: pointer; }
  .nav-btn.active { color: #8B4557; }
  .nav-icon { font-size: 22px; }

  .divider { height: 1px; background: rgba(61,43,47,0.1); margin: 48px 0; }

  .notes-section { margin-top: 16px; padding-top: 8px; }
  .notes-grid { display: grid; grid-template-columns: repeat(4, minmax(280px, 1fr)); gap: 18px; margin-top: 24px; }
  .note-card { background: rgba(255,255,255,0.7); border: 1px solid rgba(61,43,47,0.1); border-radius: 14px; padding: 16px 18px; }
  .note-card-title { font-size: 12px; font-weight: 800; color: #3D2B2F; margin-bottom: 8px; }
  .note-card-body { font-size: 12px; color: rgba(61,43,47,0.65); line-height: 1.6; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const c = {
  primary:      '#8B4557',
  primaryLight: '#C4A4AB',
  surface:      '#FAF8F8',
  surfaceDark:  '#EDE8E9',
  text:         '#3D2B2F',
  textMuted:    '#7A6468',
  danger:       '#B84444',
  success:      '#5A8B5A',
  warning:      '#C9A227',
  reintro:      '#4A7C6F',
  white:        '#fff',
};

// ── Phase data ────────────────────────────────────────────────
const PHASES = {
  reset: {
    type: 'reset',
    badge: 'RESET',
    badgeColor: c.textMuted,
    title: 'Výchozí stav kůže',
    allergen: null,
    priorReaction: null,
    progress: { type: 'long', current: 5, total: 14 },
    todayBlocks: [
      { icon: '🍽️', label: 'Jezte normálně', sub: 'bez změn jídla' },
      { icon: '👁️', label: 'Sledujte kůži', sub: 'všímejte si změn' },
      { icon: '📸', label: 'Foto kůže', sub: 'baseline', urgency: 'low' },
    ],
    canEat: [{ icon: '🍽️', name: 'Vše obvyklé', note: 'jezte normálně' }],
    avoid:  [{ icon: '🥚', name: 'Vejce', note: 'trvalé vyl.' }],
    expansionStats: { photos: '4/5', skinPrimary: '✓', skinSecondary: 'klidná', skinTone: 'success', errors: 0 },
  },
  elimination: {
    type: 'elimination',
    badge: 'ELIMINACE',
    badgeColor: c.danger,
    title: 'Eliminační fáze',
    allergen: null,
    priorReaction: null,
    progress: { type: 'long', current: 18, total: 42 },
    todayBlocks: [
      { icon: '🚫', label: 'Vylučte alergeny', sub: 'i ve skryté podobě' },
      { icon: '👁️', label: 'Sledujte kůži', sub: 'čekáme zlepšení' },
      { icon: '📸', label: 'Foto kůže', sub: 'denně', urgency: 'medium' },
    ],
    canEat: [{ icon: '🍚', name: 'Rýže' }, { icon: '🥩', name: 'Maso' }, { icon: '🍎', name: 'Ovoce' }, { icon: '🥦', name: 'Zelenina' }],
    avoid:  [{ icon: '🥛', name: 'Mléčné výr.' }, { icon: '🌾', name: 'Pšenice' }, { icon: '🫘', name: 'Sója' }, { icon: '🥜', name: 'Ořechy' }, { icon: '🐟', name: 'Ryby' }, { icon: '🍋', name: 'Citrusy' }],
    expansionStats: { photos: '17/18', skinPrimary: '↗', skinSecondary: 'zlepšení 78 %', skinTone: 'success', errors: 1 },
  },
  reintro: {
    type: 'reintroduction',
    badge: 'TEST',
    badgeColor: c.reintro,
    title: 'Test: Mléčné výrobky',
    allergen: { icon: '🥛', name: 'Mléčné výrobky' },
    priorReaction: null,
    progress: { type: 'short', current: 3, total: 5, evalDate: '3. 5.' },
    todayBlocks: [
      { icon: '🥛', label: '½ porce jogurtu', sub: 'cca 50 g' },
      { icon: '⏱️', label: 'Sledujte 4 h', sub: 'po podání' },
      { icon: '📸', label: 'Foto kůže', sub: 'ráno + večer', urgency: 'high' },
    ],
    canEat: [{ icon: '🥛', name: 'Mléčné výr.', highlight: true }, { icon: '🍚', name: 'Rýže' }, { icon: '🥩', name: 'Maso' }, { icon: '🍎', name: 'Ovoce' }],
    avoid:  [{ icon: '🌾', name: 'Pšenice' }, { icon: '🫘', name: 'Sója' }, { icon: '🥜', name: 'Ořechy' }, { icon: '🐟', name: 'Ryby' }],
    expansionStats: { photos: '2/3', skinPrimary: '✓', skinSecondary: 'bez reakce', skinTone: 'success', errors: 0 },
  },
  retest: {
    type: 'retest',
    badge: 'RE-TEST',
    badgeColor: c.primary,
    title: 'Re-test: Vejce',
    allergen: { icon: '🥚', name: 'Vejce' },
    priorReaction: 'mírná reakce',
    priorTestDate: '15.–19. 3.',
    priorDetail: 'Zarudnutí tváří v den 5–7. Letos začínáme s nižší dávkou a delším pozorováním.',
    progress: { type: 'short', current: 2, total: 5, evalDate: '7. 5.' },
    todayBlocks: [
      { icon: '🥚', label: '¼ vajíčka', sub: 'opatrná dávka' },
      { icon: '⚠️', label: 'Sledujte 4 h', sub: 'při reakci stop' },
      { icon: '📸', label: 'Foto kůže', sub: 'ráno + odpol. + večer', urgency: 'critical' },
    ],
    canEat: [{ icon: '🥚', name: 'Vejce', highlight: true }, { icon: '🥛', name: 'Mléčné výr.' }, { icon: '🍚', name: 'Rýže' }],
    avoid:  [{ icon: '🌾', name: 'Pšenice' }, { icon: '🫘', name: 'Sója' }, { icon: '🥜', name: 'Ořechy' }],
    expansionStats: { photos: '1/2', skinPrimary: '✓', skinSecondary: 'bez reakce', skinTone: 'success', errors: 0 },
  },
};

const PHASE_LABELS = {
  reset:       { label: 'Reset · den 5 / 14', dot: c.textMuted },
  elimination: { label: 'Eliminace · den 18 / 42', dot: c.danger },
  reintro:     { label: 'Test alergenu · den 3 / 5', dot: c.reintro },
  retest:      { label: 'Re-test · den 2 / 5', dot: c.primary },
  prubeh:      { label: 'Záložka Průběh', dot: '#4A8B8B' },
};

// ── Skin status data per phase (mock, illustrative) ───────────
const SKIN_LOG = {
  reset: [
    { day: 1, date: '26. 4.', status: 'clear',     label: 'Klidná kůže', photo: true },
    { day: 2, date: '27. 4.', status: 'clear',     label: 'Klidná kůže', photo: true },
    { day: 3, date: '28. 4.', status: 'mild',      label: 'Mírné zarudnutí tváří', photo: true },
    { day: 4, date: '29. 4.', status: 'unchanged', label: 'Beze změny', photo: true },
    { day: 5, date: '30. 4.', status: 'today',     label: 'Dnes — zaznamenat', photo: false },
  ],
  elimination: {
    summary: {
      trend: 'improving', trendLabel: '↗ zlepšení',
      photoCoverage: '17/18 dní',
      conflicts: 1,
    },
    recent: [
      { day: 14, date: '12. 4.', status: 'improved', label: 'Zlepšení', photo: true },
      { day: 15, date: '13. 4.', status: 'improved', label: 'Zlepšení', photo: true },
      { day: 16, date: '14. 4.', status: 'mild',     label: 'Mírné zarudnutí', photo: true, note: 'po latte' },
      { day: 17, date: '15. 4.', status: 'unchanged',label: 'Beze změny', photo: true },
      { day: 18, date: '16. 4.', status: 'today',    label: 'Dnes — zaznamenat', photo: false },
    ],
  },
};

const SKIN_STATUS_STYLE = {
  clear:      { color: c.success,  icon: '✓', bg: c.success },
  improved:   { color: c.success,  icon: '✓', bg: c.success },
  unchanged:  { color: c.textMuted,icon: '—', bg: c.textMuted },
  mild:       { color: c.warning,  icon: '⚠', bg: c.warning },
  worsened:   { color: c.warning,  icon: '!', bg: c.warning },
  newlesion:  { color: c.danger,   icon: '!!', bg: c.danger },
  today:      { color: c.primary,  icon: '●', bg: c.primary },
};

// ── Phone shell ───────────────────────────────────────────────
function PhoneShell({ phaseKey, customLabel, dotColor, children }) {
  const meta = PHASE_LABELS[phaseKey] || { label: customLabel || '', dot: dotColor || c.primary };
  return (
    <div className="phone-wrap">
      {(meta.label || customLabel) && (
        <div className="phase-label">
          <div className="phase-label-dot" style={{ background: meta.dot }} />
          {customLabel || meta.label}
        </div>
      )}
      <div className="phone-shell">
        <div className="phone-status">
          <span className="phone-time">9:41</span>
          <div className="phone-island" />
          <span className="phone-battery">●●● 🔋</span>
        </div>
        <div className="phone-content">{children}</div>
        <div className="phone-nav">
          {[['📅','Dnes'],['🍽️','Jídlo'],['📋','Program'],['⚙️','Nastavení']].map(([icon, lbl], i) => (
            <button key={lbl} className={`nav-btn ${i === 2 ? 'active' : ''}`}>
              <span className="nav-icon">{icon}</span>{lbl}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Reusables ─────────────────────────────────────────────────

function Badge({ label, color }) {
  return <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: '.1em', background: color, color: '#fff', borderRadius: 999, padding: '3px 9px' }}>{label}</span>;
}

function Tabs({ active, onChange }) {
  return (
    <div style={{ display: 'flex', gap: 4, padding: '0 16px 10px', background: c.white }}>
      {['Dnes', 'Průběh'].map(t => (
        <button key={t} onClick={() => onChange(t)}
          style={{ flex: 1, padding: '7px 0', borderRadius: 10, border: 'none', fontSize: 13, fontWeight: 600, cursor: 'pointer',
            background: active === t ? c.primary : c.surface, color: active === t ? c.white : c.textMuted, transition: 'all .2s' }}>
          {t}
        </button>
      ))}
    </div>
  );
}

function PipProgress({ current, total }) {
  return (
    <div>
      <div style={{ marginBottom: 5 }}>
        <span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600 }}>den {current} / {total}</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
        {Array.from({ length: total }).map((_, i) => (
          <div key={i} style={{ height: 7, borderRadius: 4, background: i < current ? c.primary : c.surfaceDark, flex: i < current ? '1 1 22px' : '1 1 14px', transition: 'all .3s' }} />
        ))}
      </div>
    </div>
  );
}

function DayBarProgress({ current, total }) {
  const pct = Math.round((current / total) * 100);
  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
        <span style={{ fontSize: 11, color: c.textMuted, fontWeight: 600 }}>den {current} / {total}</span>
        <span style={{ fontSize: 10, color: c.textMuted }}>{pct} %</span>
      </div>
      <div style={{ height: 8, background: c.surfaceDark, borderRadius: 4, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${pct}%`, background: c.primary, borderRadius: 4 }} />
      </div>
    </div>
  );
}

function TodayBlocks({ blocks }) {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6 }}>
      {blocks.map((b, i) => {
        const isPhoto = b.icon === '📸';
        const photoStyle = {
          critical: { bg: c.primary, color: '#fff', sub: 'rgba(255,255,255,.7)', border: c.primary },
          high:     { bg: `${c.primary}10`, color: c.primary, sub: c.textMuted, border: `${c.primary}45` },
          medium:   { bg: `${c.primary}06`, color: c.primary, sub: c.textMuted, border: `${c.primary}25` },
          low:      { bg: c.surface,        color: c.textMuted, sub: c.textMuted, border: c.surfaceDark },
        }[b.urgency || 'low'];
        const styled = isPhoto ? photoStyle : { bg: c.white, color: c.text, sub: c.textMuted, border: c.surfaceDark };
        return (
          <div key={i} style={{ background: styled.bg, border: `1.5px solid ${styled.border}`, borderRadius: 12, padding: '10px 6px', textAlign: 'center', position: 'relative' }}>
            <p style={{ fontSize: 22, lineHeight: 1 }}>{b.icon}</p>
            <p style={{ fontSize: 11, fontWeight: 700, color: styled.color, marginTop: 5, lineHeight: 1.2 }}>{b.label}</p>
            <p style={{ fontSize: 9, color: styled.sub, marginTop: 2, lineHeight: 1.3 }}>{b.sub}</p>
            {isPhoto && b.urgency === 'critical' && (
              <span style={{ position: 'absolute', top: -5, right: -5, background: '#fff', color: c.primary, borderRadius: 999, fontSize: 8, padding: '2px 6px', fontWeight: 800, border: `1px solid ${c.primary}` }}>!</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

function FoodGuideCard({ canEat, avoid, style = {} }) {
  return (
    <div style={{ background: c.white, borderRadius: 14, border: `1px solid ${c.surfaceDark}`, overflow: 'hidden', ...style }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr' }}>
        <div style={{ padding: '10px 12px', borderRight: `1px solid ${c.surfaceDark}` }}>
          <p style={{ fontSize: 9, fontWeight: 800, color: c.success, textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 8 }}>✓ Smím jíst</p>
          {canEat.map((f, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 6, marginBottom: 6 }}>
              <span style={{ fontSize: 17, lineHeight: 1 }}>{f.icon}</span>
              <div style={{ flex: 1 }}>
                <span style={{ fontSize: 11, color: c.text, fontWeight: f.highlight ? 700 : 400, lineHeight: 1.2 }}>{f.name}</span>
                {f.note && <span style={{ display: 'block', fontSize: 9, color: c.primary, fontWeight: 700 }}>{f.note}</span>}
              </div>
              {f.highlight && <span style={{ fontSize: 9, background: `${c.success}20`, color: c.success, borderRadius: 999, padding: '1px 5px', fontWeight: 700, whiteSpace: 'nowrap', flexShrink: 0 }}>dnes</span>}
            </div>
          ))}
        </div>
        <div style={{ padding: '10px 12px' }}>
          <p style={{ fontSize: 9, fontWeight: 800, color: c.danger, textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 8 }}>✗ Vyhýbám se</p>
          {avoid.map((f, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6, opacity: 0.78 }}>
              <span style={{ fontSize: 17 }}>{f.icon}</span>
              <span style={{ fontSize: 11, color: c.textMuted }}>{f.name}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Shared expansion stats tiles ──────────────────────────────
function ExpansionStatsTiles({ stats }) {
  if (!stats) return null;
  const skinColor = stats.skinTone === 'warning' ? c.warning : stats.skinTone === 'danger' ? c.danger : c.success;
  return (
    <div style={{ display: 'flex', gap: 6, marginBottom: 12 }}>
      <div style={{ flex: 1, background: c.white, border: `1px solid ${c.surfaceDark}`, borderRadius: 10, padding: '7px 6px', textAlign: 'center' }}>
        <p style={{ fontSize: 11, color: c.text, fontWeight: 700 }}>📸 {stats.photos}</p>
        <p style={{ fontSize: 9, color: c.textMuted, marginTop: 1 }}>fotek</p>
      </div>
      <div style={{ flex: 1, background: `${skinColor}15`, border: `1px solid ${skinColor}30`, borderRadius: 10, padding: '7px 6px', textAlign: 'center' }}>
        <p style={{ fontSize: 11, color: skinColor, fontWeight: 700, lineHeight: 1.2 }}>{stats.skinPrimary} {stats.skinSecondary}</p>
        <p style={{ fontSize: 9, color: c.textMuted, marginTop: 1 }}>kůže</p>
      </div>
      <div style={{ flex: 1, background: stats.errors > 0 ? `${c.warning}15` : c.white, border: `1px solid ${stats.errors > 0 ? c.warning + '30' : c.surfaceDark}`, borderRadius: 10, padding: '7px 6px', textAlign: 'center' }}>
        <p style={{ fontSize: 11, color: stats.errors > 0 ? c.warning : c.text, fontWeight: 700 }}>{stats.errors}×</p>
        <p style={{ fontSize: 9, color: c.textMuted, marginTop: 1 }}>dietní chyba</p>
      </div>
    </div>
  );
}

// ── Unified phase expansion ───────────────────────────────────
// Same shell + stats tiles for ALL phase types
// Day-list adapts: tests show dose, phases show skin note/photo
function PhaseExpansion({ phase: p }) {
  const isTest = p.type === 'reintroduction' || p.type === 'retest';
  const isReset = p.type === 'reset';
  const days = isTest
    ? buildTestDays(p)
    : (isReset ? SKIN_LOG.reset : SKIN_LOG.elimination.recent);
  const eyebrow = isTest ? 'Průběh testu · den po dni' : 'Průběh fáze · den po dni';

  return (
    <div style={{ borderTop: `1px solid ${c.surfaceDark}`, padding: '12px 14px' }}>
      <p style={{ fontSize: 9, fontWeight: 800, color: c.textMuted, textTransform: 'uppercase', letterSpacing: '.08em', marginBottom: 10 }}>
        {eyebrow}
      </p>

      <ExpansionStatsTiles stats={p.expansionStats} />

      {days.map((d, i) => {
        const skinKey = isTest
          ? (d.status === 'done' ? (d.outcome === 'ok' ? 'clear' : 'mild') : d.status === 'current' ? 'today' : 'future')
          : d.status;
        const s = SKIN_STATUS_STYLE[skinKey] || SKIN_STATUS_STYLE.unchanged;
        const circleBg = skinKey === 'future' ? c.surfaceDark : s.bg;
        const circleContent = skinKey === 'future' ? '' : (isTest && d.status === 'current' ? d.day : s.icon);

        return (
          <div key={i} style={{
            display: 'flex', alignItems: 'flex-start', gap: 10,
            padding: '7px 0',
            borderBottom: i < days.length - 1 ? `1px dashed ${c.surfaceDark}` : 'none',
            opacity: skinKey === 'future' ? 0.5 : 1,
          }}>
            <div style={{
              width: 24, height: 24, borderRadius: '50%', flexShrink: 0,
              background: circleBg, color: '#fff',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 11, fontWeight: 800,
              boxShadow: (skinKey === 'today' || (isTest && d.status === 'current')) ? `0 0 0 3px ${c.primary}25` : 'none',
              border: skinKey === 'future' ? `2px solid ${c.surfaceDark}` : 'none',
            }}>{circleContent}</div>
            <div style={{ flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: c.text }}>Den {d.day} · {d.label}</span>
                <span style={{ fontSize: 10, color: c.textMuted }}>{d.date}</span>
              </div>
              {isTest && d.dose && <p style={{ fontSize: 11, color: c.textMuted, marginTop: 1 }}>{d.dose}</p>}
              {d.notes && <p style={{ fontSize: 10, color: d.outcome === 'warn' ? c.warning : c.textMuted, marginTop: 2 }}>{d.notes}</p>}
              {!isTest && d.note && <p style={{ fontSize: 10, color: c.warning, marginTop: 1 }}>{d.note}</p>}
              {!isTest && d.photo && <p style={{ fontSize: 10, color: c.textMuted, marginTop: 1 }}>📸 foto pořízeno</p>}
            </div>
          </div>

// ── Color treatments ──────────────────────────────────────────
// "full"     : every phase wears its full color (reset = grey, elim = red, test = teal, retest = wine)
// "gradient" : 4-step gradient — neutral reset → faint elim → clear test → bold retest
function getHeroStyling(p, mode) {
  const isRetest = p.type === 'retest';

  if (mode === 'full') {
    return {
      bg: isRetest ? `${c.primary}10` : `${p.badgeColor}10`,
      border: isRetest ? c.primary : p.badgeColor,
      borderOpacity: isRetest ? '' : '60',
    };
  }

  // gradient mode (4 levels)
  const levels = {
    reset:       { bg: c.white,            border: c.surfaceDark, borderOpacity: '' },
    elimination: { bg: `${c.danger}05`,    border: c.danger,      borderOpacity: '25' },
    reintroduction: { bg: `${c.reintro}10`,border: c.reintro,     borderOpacity: '50' },
    retest:      { bg: `${c.primary}10`,   border: c.primary,     borderOpacity: '' },
  };
  return levels[p.type];
}

// ── Hero card — universally expandable ────────────────────────
function HeroCard({ phase: p, expanded, onToggle, colorStyle = 'gradient' }) {
  const isTest = p.type === 'reintroduction' || p.type === 'retest';
  const isRetest = p.type === 'retest';
  const styling = getHeroStyling(p, colorStyle);

  return (
    <div style={{
      borderRadius: 16, overflow: 'hidden', marginBottom: 12,
      border: `1.5px solid ${styling.border}${styling.borderOpacity}`,
      background: styling.bg,
    }}>
      {isRetest && (
        <div style={{ background: c.primary, padding: '6px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 11, fontWeight: 800, color: '#fff', letterSpacing: '.05em' }}>RE-TEST PROBÍHÁ</span>
          <span style={{ fontSize: 10, color: 'rgba(255,255,255,.7)' }}>1. test: {p.priorReaction}</span>
        </div>
      )}

      <div onClick={onToggle} style={{ padding: '12px 14px', cursor: 'pointer' }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            {isTest && p.allergen ? (
              <div style={{ width: 44, height: 44, borderRadius: 13, background: isRetest ? `${c.primary}18` : `${p.badgeColor}18`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26, flexShrink: 0 }}>{p.allergen.icon}</div>
            ) : (
              <div style={{ width: 40, height: 40, borderRadius: 12, background: `${p.badgeColor}15`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>
                {p.type === 'reset' ? '🔄' : '🚫'}
              </div>
            )}
            <div>
              <p style={{ fontSize: 15, fontWeight: 800, color: c.text, lineHeight: 1.2 }}>{p.title}</p>
            </div>
          </div>
          <Badge label={p.badge} color={p.badgeColor} />
        </div>

        {p.progress.type === 'short'
          ? <PipProgress current={p.progress.current} total={p.progress.total} evalDate={p.progress.evalDate} />
          : <DayBarProgress current={p.progress.current} total={p.progress.total} />}

        <div style={{ marginTop: 10, paddingTop: 10, borderTop: `1px dashed ${c.surfaceDark}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 11, color: c.textMuted, fontWeight: 500 }}>

}
