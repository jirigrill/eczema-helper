services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eczema-app-dev
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-eczema_helper}
      - POSTGRES_USER=${POSTGRES_USER:-eczema}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-eczema_dev}
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret-change-in-production-32chars}
      - LOG_LEVEL=debug
    volumes:
      - ./data/photos:/data/photos
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: eczema-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-eczema_helper}
      - POSTGRES_USER=${POSTGRES_USER:-eczema}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-eczema_dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eczema} -d ${POSTGRES_DB:-eczema_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata-dev:

networks:
  internal:
    driver: bridge
