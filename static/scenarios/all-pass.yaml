name: "Vše tolerováno — mírná, ořechy navíc"
description: "Standardní protokol rozšířený o ořechy. Všechny alergeny tolerovány, mírná ekzéma."

setup:
  babyBirthDate: "2024-01-15"
  eczemaSeverity: mild
  motherAllergies: []
  babyConfirmedAllergies: []
  programStartDate: "2024-03-01"

  # testedAllergens: which allergens are eliminated AND in what reintroduction order.
  # Add any category ID from categories.ts: soy, wheat, eggs, dairy, nuts, fish,
  # shellfish, citrus, chocolate, tomatoes, strawberries, corn, sesame, other.
  testedAllergens: [soy, wheat, eggs, dairy, nuts]

# ── How to define meals ───────────────────────────────────────────────────────
#
# Two ways to specify a meal item:
#
# 1. categoryId only — whole allergen group, name required:
#     - name: "Arašídové máslo"   categoryId: nuts    # any nut product
#     - name: "Chléb / rohlík"    categoryId: wheat   # whole-category item
#
# 2. subitemId — maps to a specific sub-item; name auto-derived from categories data:
#     - subitemId: nuts:peanuts    amount: teaspoon    # name → "Arašídy"
#     - subitemId: eggs:egg-yolk   amount: teaspoon    # name → "Žloutek"
#     - subitemId: dairy:yogurt    amount: portion     # name → "Jogurt"
#   You can still override the name: name: "Domácí jogurt"  subitemId: dairy:yogurt
#
# categoryId: null — food not tracked as any allergen (safe food):
#     - name: "Rýže"         categoryId: null
#     - name: "Mrkev"        categoryId: null

# Day indices relative to programStartDate.
# mild severity: reset = days 0–4, elimination = days 5–18 (14 days)
# Reintro with nuts added: soy 19–22, wheat 23–26, eggs 27–30, dairy 31–34, nuts 35–38
days:
  # ── Reset phase (days 0–4) ───────────────────────────────────
  2:
    assessment: unchanged
    assessmentNotes: "Výchozí stav — mírné zarudnutí"
    assessmentPhotoTaken: true
  4:
    assessment: unchanged
    evaluation:
      type: skin-status
      outcome: unchanged
      notes: "Výchozí stav zdokumentován"

  # ── Elimination phase (days 5–18) ───────────────────────────
  # Soy, wheat, eggs, dairy, AND nuts are all eliminated here.
  5:
    meals:
      - type: breakfast
        items:
          - name: "Rýžová kaše"
            categoryId: null
            amount: portion
          - name: "Jablko"
            categoryId: null
            amount: portion
        savedAt: "08:00"
  10:
    assessment: improved
    assessmentNotes: "Kůže se zlepšuje"
  18:
    assessment: improved
    assessmentPhotoTaken: true
    evaluation:
      type: skin-status
      outcome: improved
      notes: "Výrazné zlepšení — kůže téměř čistá"

  # ── Soy reintroduction (days 19–22) ─────────────────────────
  19:
    meals:
      - type: breakfast
        items:
          - subitemId: soy:tofu
            amount: teaspoon
          - name: "Rýže"
            categoryId: null
            amount: portion
        savedAt: "08:00"
  22:
    assessment: unchanged
    evaluation:
      type: allergen-test
      allergenId: soy
      outcome: tolerated
      notes: "Sója bez reakce"

  # ── Wheat reintroduction (days 23–26) ───────────────────────
  23:
    meals:
      - type: breakfast
        items:
          - name: "Chléb / rohlík"
            categoryId: wheat    # whole-category item
            amount: spoon
        savedAt: "08:00"
  26:
    assessment: unchanged
    evaluation:
      type: allergen-test
      allergenId: wheat
      outcome: tolerated
      notes: "Pšenice bez příznaků"

  # ── Eggs reintroduction (days 27–30) ────────────────────────
  27:
    meals:
      - type: breakfast
        items:
          - subitemId: eggs:egg-yolk    # just the yolk first (less allergenic)
            amount: teaspoon
          - name: "Rýže"
            categoryId: null
            amount: portion
        savedAt: "08:00"
  29:
    meals:
      - type: breakfast
        items:
          - subitemId: eggs:egg-white    # egg white (more allergenic)
            amount: teaspoon
        savedAt: "08:00"
  30:
    assessment: unchanged
    evaluation:
      type: allergen-test
      allergenId: eggs
      outcome: tolerated
      notes: "Vejce tolerována"

  # ── Dairy reintroduction (days 31–34) ───────────────────────
  31:
    meals:
      - type: breakfast
        items:
          - subitemId: dairy:yogurt
            amount: portion
        savedAt: "08:00"
  34:
    assessment: unchanged
    evaluation:
      type: allergen-test
      allergenId: dairy
      outcome: tolerated
      notes: "Mléčné výrobky tolerovány"

  # ── Nuts reintroduction (days 35–38) ────────────────────────
  # Nuts added via testedAllergens above — reintroduced last.
  35:
    meals:
      - type: snack
        items:
          - subitemId: nuts:peanuts
            amount: teaspoon
        savedAt: "15:00"
  36:
    meals:
      - type: snack
        items:
          - subitemId: nuts:hazelnuts
            amount: spoon
        savedAt: "15:00"
  37:
    meals:
      - type: snack
        items:
          - subitemId: nuts:almonds
            amount: spoon
        savedAt: "15:00"
  38:
    assessment: improved
    assessmentPhotoTaken: true
    evaluation:
      type: allergen-test
      allergenId: nuts
      outcome: tolerated
      notes: "Ořechy tolerovány — program dokončen"
