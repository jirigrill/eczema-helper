name: CI

on:
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Sync SvelteKit types
        run: bunx svelte-kit sync

      - name: TypeScript check
        run: bunx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Sync SvelteKit types
        run: bunx svelte-kit sync

      - name: Build
        run: bun run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Sync SvelteKit types
        run: bunx svelte-kit sync

      - name: Run unit tests
        run: bunx vitest run
