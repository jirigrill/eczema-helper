name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build-push:
    name: Build & Push
    needs: []
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jirigrill/eczema-helper:latest
            ghcr.io/jirigrill/eczema-helper:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/eczema-tracker/

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ghcr.io/jirigrill/eczema-helper:latest
            docker compose -f /opt/eczema-tracker/docker-compose.prod.yml run --rm app bun /app/scripts/migrate.ts
            docker compose -f /opt/eczema-tracker/docker-compose.prod.yml up -d
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/api/health; then
                echo "✅ Healthy"
                exit 0
              fi
              echo "⏳ Waiting... ($i/30)"
              sleep 2
            done
            echo "❌ Health check failed"
            exit 1

  cleanup-registry:
    name: Cleanup Old Images
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete untagged images from GHCR
        uses: actions/delete-package-versions@v5
        with:
          package-name: eczema-helper
          package-type: container
          delete-only-untagged-versions: true

      - name: Keep only the previous tagged version for rollback
        uses: actions/delete-package-versions@v5
        with:
          package-name: eczema-helper
          package-type: container
          min-versions-to-keep: 1
          ignore-versions: "^latest$"
