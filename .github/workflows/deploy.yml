name: CI/CD

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eczema_test
          POSTGRES_USER: eczema
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://eczema:test@localhost:5432/eczema_test
      POSTGRES_DB: eczema_test
      POSTGRES_USER: eczema
      POSTGRES_PASSWORD: test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate SvelteKit types
        run: bunx svelte-kit sync

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run migrations
        run: bun run db:migrate

      - name: Tests
        run: bunx vitest run

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eczema_e2e
          POSTGRES_USER: eczema
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://eczema:test@localhost:5432/eczema_e2e
      POSTGRES_DB: eczema_e2e
      POSTGRES_USER: eczema
      POSTGRES_PASSWORD: test
      SESSION_SECRET: ci-test-secret-do-not-use-in-production-32ch
      NODE_ENV: test
      REGISTRATION_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate SvelteKit types
        run: bunx svelte-kit sync

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run migrations
        run: bun run db:migrate

      - name: Start dev server
        run: bun run dev &

      - name: Wait for server
        run: bunx wait-on http://localhost:5173 --timeout 60000

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/

  build-push:
    name: Build & Push
    needs: [test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/jirigrill/eczema-helper:latest
            ghcr.io/jirigrill/eczema-helper:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ghcr.io/jirigrill/eczema-helper:latest
            docker compose -f /opt/eczema-tracker/docker-compose.prod.yml up -d

      - name: Run migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker compose -f /opt/eczema-tracker/docker-compose.prod.yml exec -T app bun run db:migrate

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3000/api/health; then
                echo "✅ Healthy"
                exit 0
              fi
              echo "⏳ Waiting... ($i/30)"
              sleep 2
            done
            echo "❌ Health check failed"
            exit 1
