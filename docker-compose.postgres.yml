services:
  postgres:
    image: postgres:16-alpine
    container_name: eczema-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-eczema_helper}
      - POSTGRES_USER=${POSTGRES_USER:-eczema}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-eczema_dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eczema} -d ${POSTGRES_DB:-eczema_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata-dev:
